<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous System V2 - Login</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1e1e2e;
      --text: #e2e2e8;
      --muted: #9ca3af;
      --accent: #a78bfa;
      --accent-dark: #7c3aed;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-container {
      background: var(--panel);
      border: 1px solid #2d2d3a;
      border-radius: 8px;
      padding: 2rem;
      width: 350px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    }

    h1 {
      color: var(--accent);
      margin-top: 0;
      font-size: 1.5rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1rem;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      background: #252538;
      border: 1px solid #3d3d4e;
      border-radius: 4px;
      color: var(--text);
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 32px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.8rem;
      user-select: none;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent-dark);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--accent);
    }

    .flash-messages {
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1>⚡ Autonomous System</h1>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
      {% for message in messages %}
      <div>{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <span class="toggle-pw" onclick="togglePassword()">Show</span>
      </div>
      <button type="submit">Authenticate</button>
    </form>
  </div>

  <script>
    function togglePassword() {
      const pwField = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-pw');
      if (pwField.type === 'password') {
        pwField.type = 'text';
        toggleBtn.textContent = 'Hide';
      } else {
        pwField.type = 'password';
        toggleBtn.textContent = 'Show';
      }
    }
  </script>
</body>

</html>
